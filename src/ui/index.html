<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f17">
  <link rel="manifest" href="/manifest.json">
  <title>Terminal Mirror</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.11.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.12.0/lib/addon-web-links.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f17;
      --bg-surface: #1a1a2e;
      --border: #2a2a4a;
      --text: #e0e0f0;
      --text-dim: #8888aa;
      --accent: #7c6cf0;
      --accent-dim: #5a4fcf;
      --error: #f05050;
      --success: #50f080;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
    }

    /* Auth Screen */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      padding: 24px;
      gap: 24px;
    }

    #auth-screen h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--accent);
    }

    #auth-screen p {
      color: var(--text-dim);
      font-size: 14px;
      text-align: center;
      max-width: 300px;
    }

    #token-input {
      width: 100%;
      max-width: 320px;
      padding: 14px 16px;
      font-size: 17px;
      font-family: "SF Mono", Menlo, monospace;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      text-align: center;
      letter-spacing: 1px;
      outline: none;
    }

    #token-input:focus { border-color: var(--accent); }

    #connect-btn {
      width: 100%;
      max-width: 320px;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #connect-btn:active { background: var(--accent-dim); }
    #connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #auth-error {
      color: var(--error);
      font-size: 13px;
      min-height: 20px;
    }

    /* Terminal Screen */
    #terminal-screen {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    #terminal-container {
      flex: 1;
      overflow: hidden;
      padding: 4px 4px 8px 4px;
      padding-top: env(safe-area-inset-top, 4px);
    }

    #terminal-container .xterm {
      height: 100%;
    }

    /* Connection indicator */
    #conn-dot {
      position: fixed;
      top: calc(env(safe-area-inset-top, 8px) + 6px);
      right: 10px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--success);
      z-index: 100;
      opacity: 0.8;
    }

    #conn-dot.disconnected {
      background: var(--error);
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 0.2; }
    }

    /* Two-row toolbar */
    #toolbar-wrapper {
      flex-shrink: 0;
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 4px);
    }

    .toolbar-row {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
    }

    .toolbar-row:first-child {
      padding-top: 6px;
    }

    .toolbar-row:last-child {
      padding-bottom: 4px;
    }

    .toolbar-divider {
      width: 1px;
      height: 22px;
      background: var(--border);
      margin: 0 2px;
      flex-shrink: 0;
    }

    .toolbar-spacer { flex: 1; }

    .key-btn {
      padding: 8px 12px;
      font-size: 13px;
      font-family: "SF Mono", Menlo, monospace;
      font-weight: 600;
      background: #252545;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: background 0.1s;
    }

    .key-btn:active { background: var(--accent-dim); }

    /* Action button colors */
    .key-btn.action-yes { background: rgba(80, 240, 128, 0.12); border-color: rgba(80, 240, 128, 0.35); color: #50f080; }
    .key-btn.action-yes:active { background: rgba(80, 240, 128, 0.3); }
    .key-btn.action-always { background: rgba(80, 208, 240, 0.12); border-color: rgba(80, 208, 240, 0.35); color: #50d0f0; }
    .key-btn.action-always:active { background: rgba(80, 208, 240, 0.3); }
    .key-btn.action-no { background: rgba(240, 80, 80, 0.12); border-color: rgba(240, 80, 80, 0.35); color: #f05050; }
    .key-btn.action-no:active { background: rgba(240, 80, 80, 0.3); }
    .key-btn.exit-btn { background: #f05050; border-color: #f05050; color: white; }
    .key-btn.exit-btn:active { background: #d03030; }

    /* Desktop site mode: bigger buttons */
    @media (min-width: 768px) {
      .key-btn {
        padding: 16px 24px;
        font-size: 18px;
        border-radius: 8px;
      }
      .toolbar-row { gap: 8px; padding: 6px 12px; }
      .toolbar-divider { height: 30px; }
    }

    .key-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* Tap-to-cursor ripple */
    .tap-ripple {
      position: fixed;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.4;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(1);
      animation: tapRipple 0.35s ease-out forwards;
      z-index: 50;
    }
    @keyframes tapRipple {
      to { transform: translate(-50%, -50%) scale(2); opacity: 0; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Auth Screen -->
  <div id="auth-screen">
    <h1>Terminal Mirror</h1>
    <p>Enter the token shown in your terminal to connect.</p>
    <input type="text" id="token-input" placeholder="Paste token here" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button id="connect-btn">Connect</button>
    <div id="auth-error"></div>
  </div>

  <!-- Terminal Screen -->
  <div id="terminal-screen" class="hidden">
    <div id="conn-dot"></div>
    <div id="terminal-container"></div>
    <div id="toolbar-wrapper">
      <div class="toolbar-row" id="nav-row">
        <button class="key-btn" data-key="\x1b[D">&larr;</button>
        <button class="key-btn" data-key="\x1b[B">&darr;</button>
        <button class="key-btn" data-key="\x1b[A">&uarr;</button>
        <button class="key-btn" data-key="\x1b[C">&rarr;</button>
        <span class="toolbar-divider"></span>
        <button class="key-btn" id="ctrl-btn">Ctrl</button>
        <button class="key-btn" data-key="\x0d">Enter</button>
        <span class="toolbar-spacer"></span>
        <button class="key-btn" data-key="\x1b">Esc</button>
      </div>
      <div class="toolbar-row" id="action-row">
        <button class="key-btn exit-btn" id="disconnect-btn">Exit</button>
        <span class="toolbar-divider"></span>
        <button class="key-btn action-yes" data-seq="1">Yes</button>
        <button class="key-btn action-always" data-seq="2">Always</button>
        <button class="key-btn action-no" data-seq="3">No</button>
        <span class="toolbar-spacer"></span>
        <button class="key-btn" data-key="\x03">C-c</button>
        <button class="key-btn" data-key="\x1a">C-z</button>
        <button class="key-btn" data-key="\x04">C-d</button>
      </div>
    </div>
  </div>

  <script>
    // --- State ---
    var ws = null;
    var token = "";
    var term = null;
    var fitAddon = null;
    var ctrlActive = false;
    var paneCols = 0;
    var paneRows = 0;

    // --- DOM refs ---
    var authScreen = document.getElementById("auth-screen");
    var termScreen = document.getElementById("terminal-screen");
    var tokenInput = document.getElementById("token-input");
    var connectBtn = document.getElementById("connect-btn");
    var authError = document.getElementById("auth-error");
    var connDot = document.getElementById("conn-dot");
    var ctrlBtn = document.getElementById("ctrl-btn");

    // --- Terminal setup ---
    var MIN_COLS = 80; // Claude Code needs at least 80 cols

    function calcFontForMinCols(minCols) {
      // Measure actual monospace char width at a known font size
      var testSize = 100;
      var probe = document.createElement("span");
      probe.style.cssText = 'font-family:"SF Mono",Menlo,"Courier New",monospace;font-size:' + testSize + 'px;position:absolute;visibility:hidden;white-space:pre;';
      probe.textContent = "MMMMMMMMMM";
      document.body.appendChild(probe);
      var charWidth = probe.offsetWidth / 10; // px per char at 100px font
      document.body.removeChild(probe);

      var container = document.getElementById("terminal-container");
      var availWidth = container.clientWidth - 12;
      // fontSize where minCols chars fit: fontSize * (charWidth/testSize) * minCols = availWidth
      var size = Math.floor(availWidth / (minCols * (charWidth / testSize)));
      return Math.max(5, Math.min(size, 16));
    }

    function initTerminal(cols, rows) {
      var fontSize = calcFontForMinCols(MIN_COLS);
      fitAddon = new FitAddon.FitAddon();

      term = new Terminal({
        fontSize: fontSize,
        fontFamily: '"SF Mono", Menlo, "Courier New", monospace',
        theme: {
          background: "#0f0f17",
          foreground: "#e0e0f0",
          cursor: "#7c6cf0",
          cursorAccent: "#0f0f17",
          selectionBackground: "#7c6cf044",
          black: "#1a1a2e",
          red: "#f05050",
          green: "#50f080",
          yellow: "#f0d050",
          blue: "#5080f0",
          magenta: "#c050f0",
          cyan: "#50d0f0",
          white: "#e0e0f0",
          brightBlack: "#4a4a6a",
          brightRed: "#ff7070",
          brightGreen: "#70ff90",
          brightYellow: "#ffd070",
          brightBlue: "#70a0ff",
          brightMagenta: "#d070ff",
          brightCyan: "#70e0ff",
          brightWhite: "#ffffff"
        },
        scrollback: 5000,
        cursorBlink: true,
        allowProposedApi: true,
        drawBoldTextInBrightColors: true,
        overviewRulerWidth: 0,
        scrollOnUserInput: true,
        fastScrollSensitivity: 5,
        smoothScrollDuration: 100,
      });

      var webLinksAddon = new WebLinksAddon.WebLinksAddon();
      term.loadAddon(fitAddon);
      term.loadAddon(webLinksAddon);
      term.open(document.getElementById("terminal-container"));

      // Fit to screen, ensuring at least MIN_COLS columns
      setTimeout(function() {
        fitAddon.fit();
        var cols = Math.max(term.cols, MIN_COLS);
        var rows = term.rows - 1; // safety margin
        if (rows < 10) rows = 10;
        term.resize(cols, rows);
      }, 200);

      // Send keystrokes to server as binary
      term.onData(function(data) {
        if (ctrlActive && data.length === 1) {
          // Convert to ctrl char: 'a' -> 0x01, 'c' -> 0x03, etc.
          var code = data.toLowerCase().charCodeAt(0);
          if (code >= 97 && code <= 122) { // a-z
            data = String.fromCharCode(code - 96);
          }
          ctrlActive = false;
          ctrlBtn.classList.remove("active");
        }
        if (ws && ws.readyState === WebSocket.OPEN) {
          var encoder = new TextEncoder();
          ws.send(encoder.encode(data));
        }
      });

      // Send resize to server so tmux matches phone dimensions
      term.onResize(function(size) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: "resize", cols: size.cols, rows: size.rows }));
        }
      });
    }

    // --- Auth ---
    connectBtn.addEventListener("click", connect);
    tokenInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") connect();
    });

    function connect() {
      token = tokenInput.value.trim();
      if (!token) {
        authError.textContent = "Please enter a token.";
        return;
      }
      authError.textContent = "";
      connectBtn.disabled = true;
      connectBtn.textContent = "Connecting...";
      openWebSocket();
    }

    // --- WebSocket ---
    var reconnectAttempts = 0;
    var reconnectTimer = null;

    function openWebSocket() {
      var protocol = location.protocol === "https:" ? "wss:" : "ws:";
      var url = protocol + "//" + location.host + "/ws?token=" + encodeURIComponent(token);

      ws = new WebSocket(url);
      ws.binaryType = "arraybuffer";

      ws.onopen = function() {
        reconnectAttempts = 0;
        authScreen.classList.add("hidden");
        termScreen.classList.remove("hidden");
        connDot.classList.remove("disconnected");
        sessionStorage.setItem("ccbridge_token", token);
        connectBtn.disabled = false;
        connectBtn.textContent = "Connect";

        // Terminal will be initialized when we receive pane_size message
        if (term) {
          term.reset();
          setTimeout(function() {
            fitAddon.fit();
            var cols = Math.max(term.cols, MIN_COLS);
            var rows = term.rows - 1;
            if (rows < 10) rows = 10;
            term.resize(cols, rows);
          }, 200);
        }
      };

      ws.onmessage = function(event) {
        if (event.data instanceof ArrayBuffer) {
          // Binary = terminal output
          if (term) term.write(new Uint8Array(event.data));
        } else {
          // Text = control message
          try {
            var msg = JSON.parse(event.data);
            if (msg.type === "pane_size") {
              paneCols = msg.cols;
              paneRows = msg.rows;
              if (!term) {
                initTerminal(paneCols, paneRows);
              }
            } else if (msg.type === "scrollback" && msg.data) {
              if (term) term.write(msg.data);
            } else if (msg.type === "error") {
              if (term) term.write("\r\n\x1b[31m[Bridge Error] " + msg.message + "\x1b[0m\r\n");
            }
          } catch (e) {}
        }
      };

      ws.onclose = function() {
        if (termScreen.classList.contains("hidden")) {
          authError.textContent = "Connection failed. Check your token.";
          connectBtn.disabled = false;
          connectBtn.textContent = "Connect";
          return;
        }
        connDot.classList.add("disconnected");
        scheduleReconnect();
      };

      ws.onerror = function() {};
    }

    function scheduleReconnect() {
      if (reconnectTimer) return;
      var delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 10000);
      reconnectAttempts++;
      reconnectTimer = setTimeout(function() {
        reconnectTimer = null;
        openWebSocket();
      }, delay);
    }

    // --- Resize/orientation: refit terminal ---
    window.addEventListener("resize", function() {
      if (fitAddon) fitAddon.fit();
    });
    window.addEventListener("orientationchange", function() {
      setTimeout(function() {
        if (fitAddon) fitAddon.fit();
      }, 300);
    });

    // --- Smooth touch scrolling for mobile ---
    (function() {
      var container = document.getElementById("terminal-container");
      var touchLastY = 0;
      var touchLastTime = 0;
      var velocities = []; // track recent velocities for flick detection
      var momentumId = null;
      var accumulated = 0;
      var PX_PER_LINE = 3; // very sensitive: 3px of swipe = 1 line

      function stopMomentum() {
        if (momentumId) { cancelAnimationFrame(momentumId); momentumId = null; }
        accumulated = 0;
        velocities = [];
      }

      container.addEventListener("touchstart", function(e) {
        if (e.touches.length === 1) {
          stopMomentum(); // touch stops any ongoing momentum
          touchLastY = e.touches[0].clientY;
          touchLastTime = Date.now();
          velocities = [];
        }
      }, { passive: true });

      container.addEventListener("touchmove", function(e) {
        if (!term || e.touches.length !== 1) return;
        var y = e.touches[0].clientY;
        var now = Date.now();
        var pixelDelta = touchLastY - y;
        var dt = now - touchLastTime || 1;

        // Track velocity (pixels per ms) for momentum calculation
        velocities.push(pixelDelta / dt);
        if (velocities.length > 5) velocities.shift();

        touchLastY = y;
        touchLastTime = now;

        // Scroll immediately — very responsive
        accumulated += pixelDelta;
        var lines = Math.trunc(accumulated / PX_PER_LINE);
        if (lines !== 0) {
          term.scrollLines(lines);
          accumulated -= lines * PX_PER_LINE;
        }
      }, { passive: true });

      container.addEventListener("touchend", function() {
        if (velocities.length === 0) return;

        // Average recent velocity, amplify for short fast flicks
        var avgVel = velocities.reduce(function(a, b) { return a + b; }, 0) / velocities.length;
        var momentum = avgVel * 40; // big multiplier for short flicks

        if (Math.abs(momentum) < 1) return;

        function tick() {
          if (Math.abs(momentum) < 0.3) return;
          accumulated += momentum;
          var lines = Math.trunc(accumulated / PX_PER_LINE);
          if (lines !== 0 && term) {
            term.scrollLines(lines);
            accumulated -= lines * PX_PER_LINE;
          }
          momentum *= 0.94;
          momentumId = requestAnimationFrame(tick);
        }

        momentumId = requestAnimationFrame(tick);
      }, { passive: true });
    })();

    // --- Disconnect button ---
    document.getElementById("disconnect-btn").addEventListener("click", function() {
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      reconnectAttempts = 999; // prevent auto-reconnect
      if (ws) ws.close();
      sessionStorage.removeItem("ccbridge_token");
      termScreen.classList.add("hidden");
      authScreen.classList.remove("hidden");
      if (term) { term.dispose(); term = null; fitAddon = null; }
    });

    // --- Special key toolbar ---
    function parseKey(raw) {
      return raw.replace(/\\x([0-9a-fA-F]{2})/g, function(_, hex) {
        return String.fromCharCode(parseInt(hex, 16));
      }).replace(/\\t/g, "\t").replace(/\\x1b/g, "\x1b");
    }

    function parseSeq(raw) {
      return parseKey(raw).replace(/\\r/g, "\r").replace(/\\n/g, "\n");
    }

    function sendKey(key) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(new TextEncoder().encode(key));
      }
    }

    // Hold-to-repeat for arrow keys
    var holdInterval = null;
    var holdTimeout = null;
    var HOLD_KEYS = ["\\x1b[A", "\\x1b[B", "\\x1b[D", "\\x1b[C"]; // up/down/left/right
    var isTouchDevice = "ontouchstart" in window;

    function startHold(btn) {
      var raw = btn.getAttribute("data-key");
      if (!raw) return;
      var key = parseKey(raw);
      sendKey(key); // send immediately
      // After 300ms, start repeating at 80ms intervals
      holdTimeout = setTimeout(function() {
        holdInterval = setInterval(function() { sendKey(key); }, 80);
      }, 300);
    }

    function stopHold() {
      if (holdTimeout) { clearTimeout(holdTimeout); holdTimeout = null; }
      if (holdInterval) { clearInterval(holdInterval); holdInterval = null; }
    }

    var toolbar = document.getElementById("toolbar-wrapper");

    // Touch events for hold-to-repeat
    toolbar.addEventListener("touchstart", function(e) {
      var btn = e.target.closest(".key-btn");
      if (!btn || !term || btn.id === "ctrl-btn" || btn.id === "disconnect-btn") return;
      var raw = btn.getAttribute("data-key");
      if (raw && HOLD_KEYS.indexOf(raw) !== -1) {
        e.preventDefault();
        startHold(btn);
      }
    }, { passive: false });

    toolbar.addEventListener("touchend", stopHold, { passive: true });
    toolbar.addEventListener("touchcancel", stopHold, { passive: true });

    // Click for all toolbar buttons
    toolbar.addEventListener("click", function(e) {
      var btn = e.target.closest(".key-btn");
      if (!btn || !term) return;

      if (btn.id === "ctrl-btn") {
        ctrlActive = !ctrlActive;
        btn.classList.toggle("active", ctrlActive);
        term.focus();
        return;
      }

      if (btn.id === "disconnect-btn") return; // handled separately

      // Handle data-seq buttons (Yes/Always/No)
      var seq = btn.getAttribute("data-seq");
      if (seq) {
        sendKey(parseSeq(seq));
        term.focus();
        return;
      }

      var raw = btn.getAttribute("data-key");
      if (!raw) return;

      // Arrow keys: on touch devices, handled by touchstart hold; on desktop, send here
      if (HOLD_KEYS.indexOf(raw) !== -1) {
        if (isTouchDevice) return;
        sendKey(parseKey(raw));
        term.focus();
        return;
      }

      var key = parseKey(raw);
      if (ctrlActive && key.length === 1) {
        var code = key.toLowerCase().charCodeAt(0);
        if (code >= 97 && code <= 122) key = String.fromCharCode(code - 96);
        ctrlActive = false;
        ctrlBtn.classList.remove("active");
      }
      sendKey(key);
      term.focus();
    });

    // --- Tap-to-move cursor (horizontal only) ---
    (function() {
      var container = document.getElementById("terminal-container");
      var tapStartX = 0, tapStartY = 0, tapStartTime = 0;
      var wasDrag = false;

      container.addEventListener("touchstart", function(e) {
        if (e.touches.length === 1) {
          tapStartX = e.touches[0].clientX;
          tapStartY = e.touches[0].clientY;
          tapStartTime = Date.now();
          wasDrag = false;
        }
      }, { passive: true });

      container.addEventListener("touchmove", function(e) {
        if (e.touches.length !== 1) return;
        var dx = e.touches[0].clientX - tapStartX;
        var dy = e.touches[0].clientY - tapStartY;
        if (Math.abs(dx) > 10 || Math.abs(dy) > 10) wasDrag = true;
      }, { passive: true });

      container.addEventListener("touchend", function(e) {
        if (wasDrag || !term || !ws) return;
        if (Date.now() - tapStartTime > 300) return;

        var touch = e.changedTouches[0];
        if (!touch) return;

        var screen = document.querySelector(".xterm-screen");
        if (!screen) return;
        var rect = screen.getBoundingClientRect();
        var cellWidth = rect.width / term.cols;
        var cellHeight = rect.height / term.rows;

        var tapCol = Math.floor((touch.clientX - rect.left) / cellWidth);
        var tapRow = Math.floor((touch.clientY - rect.top) / cellHeight);
        tapCol = Math.max(0, Math.min(tapCol, term.cols - 1));
        tapRow = Math.max(0, Math.min(tapRow, term.rows - 1));

        var buf = term.buffer.active;
        if (tapRow !== buf.cursorY) return; // horizontal only
        if (buf.viewportY !== buf.baseY) return; // skip if viewing scrollback

        var delta = tapCol - buf.cursorX;
        if (delta === 0) return;

        var arrowKey = delta > 0 ? "\x1b[C" : "\x1b[D";
        var seq = "";
        for (var i = 0; i < Math.abs(delta); i++) seq += arrowKey;
        sendKey(seq);

        // Visual ripple
        var ripple = document.createElement("div");
        ripple.className = "tap-ripple";
        ripple.style.left = touch.clientX + "px";
        ripple.style.top = touch.clientY + "px";
        document.body.appendChild(ripple);
        ripple.addEventListener("animationend", function() { ripple.remove(); });
        setTimeout(function() { if (ripple.parentNode) ripple.remove(); }, 500);
      }, { passive: true });
    })();

    // --- Auto-restore session ---
    var savedToken = sessionStorage.getItem("ccbridge_token");
    if (savedToken) {
      token = savedToken;
      openWebSocket();
    }
  </script>
</body>
</html>
