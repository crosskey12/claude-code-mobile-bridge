<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f17">
  <link rel="manifest" href="/manifest.json">
  <title>Terminal Mirror</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.11.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.12.0/lib/addon-web-links.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f17;
      --bg-surface: #1a1a2e;
      --border: #2a2a4a;
      --text: #e0e0f0;
      --text-dim: #8888aa;
      --accent: #7c6cf0;
      --accent-dim: #5a4fcf;
      --error: #f05050;
      --success: #50f080;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
    }

    /* Auth Screen */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      padding: 24px;
      gap: 24px;
    }

    #auth-screen h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--accent);
    }

    #auth-screen p {
      color: var(--text-dim);
      font-size: 14px;
      text-align: center;
      max-width: 300px;
    }

    #token-input {
      width: 100%;
      max-width: 320px;
      padding: 14px 16px;
      font-size: 17px;
      font-family: "SF Mono", Menlo, monospace;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      text-align: center;
      letter-spacing: 1px;
      outline: none;
    }

    #token-input:focus { border-color: var(--accent); }

    #connect-btn {
      width: 100%;
      max-width: 320px;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #connect-btn:active { background: var(--accent-dim); }
    #connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #auth-error {
      color: var(--error);
      font-size: 13px;
      min-height: 20px;
    }

    /* Terminal Screen */
    #terminal-screen {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    #terminal-container {
      flex: 1;
      overflow: hidden;
      padding: 4px;
      padding-top: env(safe-area-inset-top, 4px);
    }

    #terminal-container .xterm {
      height: 100%;
    }

    /* Connection indicator */
    #conn-dot {
      position: fixed;
      top: calc(env(safe-area-inset-top, 8px) + 6px);
      right: 10px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--success);
      z-index: 100;
      opacity: 0.8;
    }

    #conn-dot.disconnected {
      background: var(--error);
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 0.2; }
    }

    /* Special key toolbar */
    #key-toolbar {
      display: flex;
      gap: 4px;
      padding: 6px 8px;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 6px);
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .key-btn {
      padding: 8px 12px;
      font-size: 13px;
      font-family: "SF Mono", Menlo, monospace;
      font-weight: 600;
      background: #252545;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: background 0.1s;
    }

    .key-btn:active { background: var(--accent-dim); }

    .key-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Auth Screen -->
  <div id="auth-screen">
    <h1>Terminal Mirror</h1>
    <p>Enter the token shown in your terminal to connect.</p>
    <input type="text" id="token-input" placeholder="Paste token here" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button id="connect-btn">Connect</button>
    <div id="auth-error"></div>
  </div>

  <!-- Terminal Screen -->
  <div id="terminal-screen" class="hidden">
    <div id="conn-dot"></div>
    <div id="terminal-container"></div>
    <div id="key-toolbar">
      <button class="key-btn" data-key="\x1b">Esc</button>
      <button class="key-btn" id="ctrl-btn">Ctrl</button>
      <button class="key-btn" data-key="\t">Tab</button>
      <button class="key-btn" data-key="\x03">C-c</button>
      <button class="key-btn" data-key="\x1a">C-z</button>
      <button class="key-btn" data-key="\x04">C-d</button>
      <button class="key-btn" data-key="\x1b[A">&uarr;</button>
      <button class="key-btn" data-key="\x1b[B">&darr;</button>
      <button class="key-btn" data-key="\x1b[D">&larr;</button>
      <button class="key-btn" data-key="\x1b[C">&rarr;</button>
      <button class="key-btn" id="disconnect-btn" style="margin-left:auto;background:#f05050;border-color:#f05050;color:white;">Exit</button>
    </div>
  </div>

  <script>
    // --- State ---
    var ws = null;
    var token = "";
    var term = null;
    var fitAddon = null;
    var ctrlActive = false;
    var paneCols = 0;
    var paneRows = 0;

    // --- DOM refs ---
    var authScreen = document.getElementById("auth-screen");
    var termScreen = document.getElementById("terminal-screen");
    var tokenInput = document.getElementById("token-input");
    var connectBtn = document.getElementById("connect-btn");
    var authError = document.getElementById("auth-error");
    var connDot = document.getElementById("conn-dot");
    var ctrlBtn = document.getElementById("ctrl-btn");

    // --- Terminal setup ---
    function initTerminal(cols, rows) {
      // Use FitAddon to let xterm.js pick its own natural size for the phone.
      // Lines from tmux (which is wider) will wrap, but text is readable.
      // Font size 13 gives ~45-50 cols on a phone in portrait — good enough.
      fitAddon = new FitAddon.FitAddon();

      term = new Terminal({
        fontSize: 13,
        fontFamily: '"SF Mono", Menlo, "Courier New", monospace',
        theme: {
          background: "#0f0f17",
          foreground: "#e0e0f0",
          cursor: "#7c6cf0",
          cursorAccent: "#0f0f17",
          selectionBackground: "#7c6cf044",
          black: "#1a1a2e",
          red: "#f05050",
          green: "#50f080",
          yellow: "#f0d050",
          blue: "#5080f0",
          magenta: "#c050f0",
          cyan: "#50d0f0",
          white: "#e0e0f0",
          brightBlack: "#4a4a6a",
          brightRed: "#ff7070",
          brightGreen: "#70ff90",
          brightYellow: "#ffd070",
          brightBlue: "#70a0ff",
          brightMagenta: "#d070ff",
          brightCyan: "#70e0ff",
          brightWhite: "#ffffff"
        },
        scrollback: 5000,
        cursorBlink: true,
        allowProposedApi: true,
        drawBoldTextInBrightColors: true,
        overviewRulerWidth: 0,
        scrollOnUserInput: true,
        fastScrollSensitivity: 5,
        smoothScrollDuration: 100,
      });

      var webLinksAddon = new WebLinksAddon.WebLinksAddon();
      term.loadAddon(fitAddon);
      term.loadAddon(webLinksAddon);
      term.open(document.getElementById("terminal-container"));

      // Let xterm.js fit naturally to the phone screen
      requestAnimationFrame(function() {
        fitAddon.fit();
      });

      // Send keystrokes to server as binary
      term.onData(function(data) {
        if (ctrlActive && data.length === 1) {
          // Convert to ctrl char: 'a' -> 0x01, 'c' -> 0x03, etc.
          var code = data.toLowerCase().charCodeAt(0);
          if (code >= 97 && code <= 122) { // a-z
            data = String.fromCharCode(code - 96);
          }
          ctrlActive = false;
          ctrlBtn.classList.remove("active");
        }
        if (ws && ws.readyState === WebSocket.OPEN) {
          var encoder = new TextEncoder();
          ws.send(encoder.encode(data));
        }
      });

      // Send resize to server so tmux matches phone dimensions
      term.onResize(function(size) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: "resize", cols: size.cols, rows: size.rows }));
        }
      });
    }

    // --- Auth ---
    connectBtn.addEventListener("click", connect);
    tokenInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") connect();
    });

    function connect() {
      token = tokenInput.value.trim();
      if (!token) {
        authError.textContent = "Please enter a token.";
        return;
      }
      authError.textContent = "";
      connectBtn.disabled = true;
      connectBtn.textContent = "Connecting...";
      openWebSocket();
    }

    // --- WebSocket ---
    var reconnectAttempts = 0;
    var reconnectTimer = null;

    function openWebSocket() {
      var protocol = location.protocol === "https:" ? "wss:" : "ws:";
      var url = protocol + "//" + location.host + "/ws?token=" + encodeURIComponent(token);

      ws = new WebSocket(url);
      ws.binaryType = "arraybuffer";

      ws.onopen = function() {
        reconnectAttempts = 0;
        authScreen.classList.add("hidden");
        termScreen.classList.remove("hidden");
        connDot.classList.remove("disconnected");
        sessionStorage.setItem("ccbridge_token", token);
        connectBtn.disabled = false;
        connectBtn.textContent = "Connect";

        // Terminal will be initialized when we receive pane_size message
        if (term) {
          term.reset();
          requestAnimationFrame(function() {
            fitAddon.fit(); // re-fit and send resize to server
          });
        }
      };

      ws.onmessage = function(event) {
        if (event.data instanceof ArrayBuffer) {
          // Binary = terminal output
          if (term) term.write(new Uint8Array(event.data));
        } else {
          // Text = control message
          try {
            var msg = JSON.parse(event.data);
            if (msg.type === "pane_size") {
              paneCols = msg.cols;
              paneRows = msg.rows;
              if (!term) {
                initTerminal(paneCols, paneRows);
              }
            } else if (msg.type === "scrollback" && msg.data) {
              if (term) term.write(msg.data);
            } else if (msg.type === "error") {
              if (term) term.write("\r\n\x1b[31m[Bridge Error] " + msg.message + "\x1b[0m\r\n");
            }
          } catch (e) {}
        }
      };

      ws.onclose = function() {
        if (termScreen.classList.contains("hidden")) {
          authError.textContent = "Connection failed. Check your token.";
          connectBtn.disabled = false;
          connectBtn.textContent = "Connect";
          return;
        }
        connDot.classList.add("disconnected");
        scheduleReconnect();
      };

      ws.onerror = function() {};
    }

    function scheduleReconnect() {
      if (reconnectTimer) return;
      var delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 10000);
      reconnectAttempts++;
      reconnectTimer = setTimeout(function() {
        reconnectTimer = null;
        openWebSocket();
      }, delay);
    }

    // --- Resize/orientation: refit terminal ---
    window.addEventListener("resize", function() {
      if (fitAddon) fitAddon.fit();
    });
    window.addEventListener("orientationchange", function() {
      setTimeout(function() {
        if (fitAddon) fitAddon.fit();
      }, 300);
    });

    // --- Touch scrolling for mobile ---
    (function() {
      var container = document.getElementById("terminal-container");
      var touchStartY = 0;
      var touchLastY = 0;

      container.addEventListener("touchstart", function(e) {
        if (e.touches.length === 1) {
          touchStartY = e.touches[0].clientY;
          touchLastY = touchStartY;
        }
      }, { passive: true });

      container.addEventListener("touchmove", function(e) {
        if (!term || e.touches.length !== 1) return;
        var y = e.touches[0].clientY;
        var delta = touchLastY - y;
        touchLastY = y;

        // Convert pixel delta to lines (roughly 1 line per 20px)
        var lines = Math.round(delta / 16);
        if (lines !== 0) {
          term.scrollLines(lines);
        }
      }, { passive: true });
    })();

    // --- Disconnect button ---
    document.getElementById("disconnect-btn").addEventListener("click", function() {
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      reconnectAttempts = 999; // prevent auto-reconnect
      if (ws) ws.close();
      sessionStorage.removeItem("ccbridge_token");
      termScreen.classList.add("hidden");
      authScreen.classList.remove("hidden");
      if (term) { term.dispose(); term = null; fitAddon = null; }
    });

    // --- Special key toolbar ---
    document.getElementById("key-toolbar").addEventListener("click", function(e) {
      var btn = e.target.closest(".key-btn");
      if (!btn || !term) return;

      if (btn.id === "ctrl-btn") {
        ctrlActive = !ctrlActive;
        btn.classList.toggle("active", ctrlActive);
        term.focus();
        return;
      }

      var key = btn.getAttribute("data-key");
      if (key) {
        // Unescape the key string (data attributes store literal chars)
        key = key.replace(/\\x([0-9a-fA-F]{2})/g, function(_, hex) {
          return String.fromCharCode(parseInt(hex, 16));
        }).replace(/\\t/g, "\t").replace(/\\x1b/g, "\x1b");

        if (ws && ws.readyState === WebSocket.OPEN) {
          var encoder = new TextEncoder();
          ws.send(encoder.encode(key));
        }
        term.focus();
      }
    });

    // --- Auto-restore session ---
    var savedToken = sessionStorage.getItem("ccbridge_token");
    if (savedToken) {
      token = savedToken;
      openWebSocket();
    }
  </script>
</body>
</html>
